<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Opening Cosmic Almanac</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #09080b;
      color: #f7efe3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }

    a {
      color: #e9c98f;
    }
  </style>
  <script>
    try {
      localStorage.setItem('cosmic_analytics_opt_out', '1');
    } catch (e) {}

    window.setTimeout(function () {
      window.location.replace('./');
    }, 300);
  </script>
</head>
<body>
  <main>
    <p>Opening Cosmic Almanac without analytics...</p>
    <p><a href="./">Open now</a></p>
  </main>
</body>
</html>
