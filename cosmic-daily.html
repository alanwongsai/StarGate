<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cosmic Daily">
  <meta name="theme-color" content="#09080b">
  <link rel="apple-touch-icon" href="cosmic-daily-icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Cosmic Daily ✦</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    :root{
      --bg:      #09080b;
      --g0:      rgba(255,252,248,0.052);
      --gb:      rgba(255,252,248,0.088);
      --c0:      rgba(255,252,248,0.036);
      --cb:      rgba(255,252,248,0.066);
      --gold:    #c4a55a;
      --goldg:   rgba(196,165,90,0.22);
      --t1:      rgba(255,252,248,0.93);
      --t2:      rgba(255,252,248,0.50);
      --t3:      rgba(255,252,248,0.26);
    }

    html,body{
      min-height:100%;background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
      color:var(--t1);overflow-x:hidden;
    }

    /* ── BACKGROUND ───────────────────────────── */
    .bg{position:fixed;inset:0;z-index:0;pointer-events:none}

    .bg-depth{
      position:absolute;inset:0;
      background:
        radial-gradient(ellipse 80% 45% at 50% 115%, rgba(170,130,35,.07)  0%,transparent 55%),
        radial-gradient(ellipse 65% 40% at 50% -8%,  rgba(25,20,42,.50)   0%,transparent 55%),
        radial-gradient(ellipse 30% 70% at 0%   50%, rgba(18,14,30,.30)   0%,transparent 55%),
        radial-gradient(ellipse 30% 70% at 100% 50%, rgba(18,14,30,.30)   0%,transparent 55%);
      animation:breathe 18s ease-in-out infinite alternate;
    }
    @keyframes breathe{0%{opacity:.82}100%{opacity:1}}

    .bg-stars{
      position:absolute;inset:0;
      background-image:
        radial-gradient(1.2px 1.2px at  9% 17%, rgba(255,252,248,.42) 0%,transparent 100%),
        radial-gradient(1.6px 1.6px at 28% 63%, rgba(255,252,248,.32) 0%,transparent 100%),
        radial-gradient(1px   1px   at 43%  8%, rgba(255,252,248,.38) 0%,transparent 100%),
        radial-gradient(2px   2px   at 62% 27%, rgba(255,252,248,.48) 0%,transparent 100%),
        radial-gradient(1px   1px   at 80% 72%, rgba(255,252,248,.28) 0%,transparent 100%),
        radial-gradient(1.4px 1.4px at 17% 85%, rgba(255,252,248,.40) 0%,transparent 100%),
        radial-gradient(1px   1px   at 91% 14%, rgba(255,252,248,.25) 0%,transparent 100%),
        radial-gradient(1.8px 1.8px at 37% 78%, rgba(255,252,248,.52) 0%,transparent 100%),
        radial-gradient(1px   1px   at 71% 44%, rgba(255,252,248,.30) 0%,transparent 100%),
        radial-gradient(1.2px 1.2px at 54% 91%, rgba(255,252,248,.36) 0%,transparent 100%);
      animation:twinkle 9s ease-in-out infinite alternate;
    }
    @keyframes twinkle{0%{opacity:.60}100%{opacity:1}}

    /* ── LANG TOGGLE ──────────────────────────── */
    .lang-btn{
      position:fixed;top:max(18px,env(safe-area-inset-top,18px));right:18px;z-index:200;
      background:var(--g0);border:1px solid var(--gb);
      backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);
      border-radius:20px;padding:6px 14px;
      font-size:13px;font-weight:500;color:var(--t2);
      cursor:pointer;font-family:inherit;transition:all .2s;letter-spacing:.4px;
    }
    .lang-btn:hover{background:rgba(255,252,248,.09);color:var(--t1)}

    /* ── GLASS ────────────────────────────────── */
    .glass{
      background:var(--g0);
      backdrop-filter:blur(30px) saturate(180%) brightness(1.08);
      -webkit-backdrop-filter:blur(30px) saturate(180%) brightness(1.08);
      border:1px solid var(--gb);border-radius:26px;
      box-shadow:0 8px 40px rgba(0,0,0,.40),inset 0 1px 0 rgba(255,252,248,.08);
    }
    .card{
      background:var(--c0);
      backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);
      border:1px solid var(--cb);border-radius:22px;
      box-shadow:0 4px 20px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,252,248,.05);
    }

    /* ── LAYOUT ───────────────────────────────── */
    .screen{
      position:relative;z-index:1;min-height:100dvh;
      display:flex;flex-direction:column;align-items:center;
      padding:max(56px,env(safe-area-inset-top,56px)) 18px max(40px,env(safe-area-inset-bottom,40px));
    }
    .screen.hidden{display:none}

    /* ── ONBOARDING ───────────────────────────── */
    #onboarding{justify-content:center;gap:30px;padding-top:90px;padding-bottom:60px}

    .hero{text-align:center}
    .app-icon{
      font-size:68px;display:block;margin-bottom:22px;
      filter:drop-shadow(0 0 22px rgba(196,165,90,.55));
      animation:floatY 4.5s ease-in-out infinite;
    }
    @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-11px)}}

    .app-title{
      font-size:36px;font-weight:700;letter-spacing:-.5px;margin-bottom:12px;
      background:linear-gradient(135deg,rgba(255,252,248,.96) 0%,var(--gold) 55%,rgba(255,232,180,.85) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .app-sub{font-size:15.5px;color:var(--t2);line-height:1.62;max-width:285px;margin:0 auto}

    .ob-card{width:100%;max-width:375px;padding:28px 26px}
    .ob-card h2{font-size:19px;font-weight:600;margin-bottom:7px;color:var(--t1)}
    .ob-card p {font-size:14px;color:var(--t2);line-height:1.55;margin-bottom:24px}

    .field-lbl{font-size:11.5px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}

    .date-input{
      width:100%;background:rgba(255,252,248,.05);
      border:1px solid rgba(255,252,248,.12);border-radius:16px;
      padding:15px 18px;font-size:17px;font-weight:500;color:#fff;
      margin-bottom:22px;outline:none;
      transition:border-color .2s,background .2s;
      -webkit-appearance:none;font-family:inherit;color-scheme:dark;
    }
    .date-input:focus{border-color:rgba(196,165,90,.50);background:rgba(255,252,248,.09)}

    .btn-reveal{
      width:100%;
      background:linear-gradient(135deg,rgba(196,165,90,.22),rgba(196,165,90,.12));
      border:1px solid rgba(196,165,90,.38);
      backdrop-filter:blur(10px);color:var(--t1);
      font-size:16px;font-weight:600;padding:16px;border-radius:18px;
      cursor:pointer;transition:all .22s;font-family:inherit;letter-spacing:.3px;
    }
    .btn-reveal:hover{background:linear-gradient(135deg,rgba(196,165,90,.34),rgba(196,165,90,.20));transform:translateY(-1px);box-shadow:0 8px 28px var(--goldg)}
    .btn-reveal:active{transform:translateY(0)}

    /* ── READING ──────────────────────────────── */
    #reading{gap:13px;padding-top:58px;padding-bottom:48px}

    .r-header{width:100%;max-width:430px;text-align:center;margin-bottom:4px}
    .r-date  {font-size:11.5px;color:var(--t3);letter-spacing:1.6px;text-transform:uppercase;margin-bottom:6px}
    .r-title {font-size:25px;font-weight:700;letter-spacing:-.3px}
    .signs-row{display:flex;justify-content:center;gap:7px;margin-top:13px;flex-wrap:wrap}

    .badge{
      background:rgba(255,252,248,.05);border:1px solid rgba(255,252,248,.09);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border-radius:20px;padding:5px 13px;font-size:13px;color:var(--t2);
      display:flex;align-items:center;gap:5px;
    }

    /* ── CATEGORY GRID ────────────────────────── */
    .cat-grid{width:100%;max-width:430px;display:grid;grid-template-columns:1fr 1fr;gap:11px}
    .cat-card{padding:17px 15px;display:flex;flex-direction:column;gap:9px}
    .cat-head{display:flex;align-items:center;gap:8px}
    .cat-icon{font-size:20px;filter:drop-shadow(0 2px 5px rgba(196,165,90,.35))}
    .cat-name{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.9px}
    .dots    {display:flex;gap:4px}
    .dot     {width:7px;height:7px;border-radius:50%;background:rgba(255,252,248,.12);transition:background .3s}
    .dot.on  {background:var(--gold);box-shadow:0 0 8px rgba(196,165,90,.40)}
    .r-lbl   {font-size:11px;color:var(--t3);font-weight:500;letter-spacing:.3px}
    .cat-msg {font-size:12.5px;color:var(--t2);line-height:1.55}

    /* ── ORACLE ───────────────────────────────── */
    .oracle-card{width:100%;max-width:430px;padding:24px 22px}
    .oracle-lbl {font-size:11px;font-weight:600;letter-spacing:1.7px;text-transform:uppercase;color:var(--gold);opacity:.80;margin-bottom:14px}
    .oracle-txt {font-size:15.5px;line-height:1.72;color:var(--t1)}

    /* ── SUGGESTION ───────────────────────────── */
    .sug-card{width:100%;max-width:430px;padding:18px 20px;display:flex;align-items:flex-start;gap:13px}
    .sug-icon{
      width:42px;height:42px;flex-shrink:0;
      background:rgba(196,165,90,.12);border:1px solid rgba(196,165,90,.22);
      border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;
    }
    .sug-lbl {font-size:11px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;color:var(--gold);opacity:.75;margin-bottom:6px}
    .sug-txt {font-size:14px;color:var(--t2);line-height:1.58}

    /* ── FOOTER ───────────────────────────────── */
    .r-footer{width:100%;max-width:430px;display:flex;justify-content:space-between;align-items:center;padding:6px 4px;margin-top:3px}
    .r-foot-info{font-size:12px;color:var(--t3)}
    .btn-reset{background:none;border:none;font-size:12px;color:var(--t3);cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:2px;padding:4px;transition:color .2s}
    .btn-reset:hover{color:var(--t2)}

    /* ── ANIMATION ────────────────────────────── */
    .fu{animation:fadeUp .55s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .d0{animation-delay:0s}.d1{animation-delay:.07s}.d2{animation-delay:.14s}
    .d3{animation-delay:.21s}.d4{animation-delay:.28s}.d5{animation-delay:.36s}
    .d6{animation-delay:.44s}.d7{animation-delay:.52s}
  </style>
</head>
<body>

<div class="bg" aria-hidden="true">
  <div class="bg-depth"></div>
  <div class="bg-stars"></div>
</div>

<button class="lang-btn" id="lang-btn" onclick="toggleLang()">中文</button>

<!-- ═══ ONBOARDING ═══ -->
<div id="onboarding" class="screen hidden">

    <div class="field-lbl" id="ob-lbl"></div>
    <input type="date" id="bday-input" class="date-input"/>
    <button class="btn-reveal" id="ob-btn" onclick="startReading()"></button>
  </div>
</div>

<!-- ═══ READING ═══ -->
<div id="reading" class="screen hidden">
  <div class="r-header fu d0">
    <div class="r-date"  id="r-date"></div>
    <div class="r-title" id="r-title"></div>
    <div class="signs-row" id="r-signs"></div>
  </div>
  <div class="cat-grid" id="cat-grid"></div>
  <div class="glass oracle-card fu d5">
    <div class="oracle-lbl" id="oracle-lbl"></div>
    <div class="oracle-txt" id="oracle-txt"></div>
  </div>
  <div class="card sug-card fu d6">
    <div class="sug-icon">🎯</div>
    <div>
      <div class="sug-lbl" id="sug-lbl"></div>
      <div class="sug-txt" id="sug-txt"></div>
    </div>
  </div>
  <div class="r-footer fu d7">
    <span class="r-foot-info" id="r-foot"></span>
    <button class="btn-reset" id="btn-reset" onclick="resetBday()"></button>
  </div>
</div>

function westIdx(m,d){
  const b=[[12,22],[1,20],[2,19],[3,21],[4,20],[5,21],[6,21],[7,23],[8,23],[9,23],[10,23],[11,22]];
  for(let i=0;i<12;i++){
    const[bm,bd]=b[i],[nm,nd]=b[(i+1)%12];
    if(i===11){if((m===11&&d>=22)||(m===12&&d<=21))return i;}
    else if((m===bm&&d>=bd)||(m===nm&&d<=nd-1))return i;
  }
  return 0;
}

function chiIdx(y){return((y-1900)%12+12)%12}

function moonIdx(date){
  const d=new Date(date),y=d.getFullYear(),mo=d.getMonth()+1,day=d.getDate();
  const jd=367*y-Math.floor(7*(y+Math.floor((mo+9)/12))/4)+Math.floor(275*mo/9)+day+1721013.5;
  const phase=(((jd-2451549.5)%29.53058867)+29.53058867)%29.53058867/29.53058867;
  const t=[.0625,.1875,.3125,.4375,.5625,.6875,.8125,.9375];
  for(let i=0;i<8;i++)if(phase<t[i])return i;
  return 0;
}

// ═══════════════════════════════════════════════════════════════
//  RNG
// ═══════════════════════════════════════════════════════════════
function mkRng(seed){
  let s=seed|0;
  return()=>{s^=s<<13;s^=s>>17;s^=s<<5;return(s>>>0)/0xffffffff};
}
function dailySeed(bday,today){
  const b=new Date(bday),t=new Date(today);
  const bv=b.getFullYear()*10000+(b.getMonth()+1)*100+b.getDate();
  const tv=t.getFullYear()*10000+(t.getMonth()+1)*100+t.getDate();
  return Math.abs((bv*2654435769)^(tv*2246822519))%0x7fffffff;
}
function pickRating(rng){
  const r=rng();
  if(r<.10)return 1;if(r<.26)return 2;if(r<.54)return 3;if(r<.78)return 4;return 5;
}
function pick(arr,rng){return arr[Math.floor(rng()*arr.length)]}

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
function dots(n){
  let h='<div class="dots">';
  for(let i=1;i<=5;i++)h+=`<div class="dot${i<=n?' on':''}"></div>`;
  return h+'</div>';
}

function $ (id){return document.getElementById(id)}
function tx(id,v){$(id).textContent=v}

// ═══════════════════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════════════════
let lang = localStorage.getItem('cosmic_lang') || 'en';

function toggleLang(){
  lang = lang==='en'?'zh':'en';
  localStorage.setItem('cosmic_lang',lang);
  const bday=localStorage.getItem('cosmic_bday');
  applyStaticLang();
  if(bday && !$('reading').classList.contains('hidden'))renderReading(bday);
}

function applyStaticLang(){
  const L=LANG[lang];
  $('lang-btn').textContent = L.langToggle;
  tx('ob-title', L.appTitle);
  tx('ob-sub',   L.appSub);
  tx('ob-h2',    L.obH2);
  tx('ob-p',     L.obP);
  tx('ob-lbl',   L.obLbl);
  tx('ob-btn',   L.obBtn);
  if($('oracle-lbl'))tx('oracle-lbl',L.oracleLbl);
  if($('sug-lbl')) tx('sug-lbl',   L.sugLbl);
  if($('btn-reset'))tx('btn-reset', L.changeBtn);
  document.documentElement.lang = lang==='zh'?'zh-Hans':'en';
}

function show(id){
  ['onboarding','reading'].forEach(s=>$(s).classList.add('hidden'));
  $(id).classList.remove('hidden');
}

function startReading(){
  const v=$('bday-input').value;
  if(!v){
    $('bday-input').style.borderColor='rgba(196,165,90,.55)';
    setTimeout(()=>$('bday-input').style.borderColor='',900);
    return;
  }
  localStorage.setItem('cosmic_bday',v);
  show('reading');
  renderReading(v);
}

function resetBday(){
  const L=LANG[lang];
  if(!confirm(L.resetMsg))return;
  localStorage.removeItem('cosmic_bday');
  $('bday-input').value='';
  show('onboarding');
}

function renderReading(bday){
  const L=LANG[lang];
  applyStaticLang();

  const birth=new Date(bday),today=new Date();
  const bM=birth.getMonth()+1,bD=birth.getDate(),bY=birth.getFullYear();

  const wi=westIdx(bM,bD), ci=chiIdx(bY), mi=moonIdx(today);
  const wsEmoji=WEST_EMOJI[wi], czEmoji=CHI_EMOJI[ci], moonEmoji=MOON_EMOJI[mi];
  const wsName=L.westNames[wi], czName=L.chiNames[ci], moonName=L.moonNames[mi];

  const todayStr=today.toISOString().split('T')[0];
  const rng=mkRng(dailySeed(bday,todayStr));

  // Ratings & messages
  const ratings={}, msgs={};
  for(const k of CAT_KEYS){
    ratings[k]=pickRating(rng);
    msgs[k]=pick(L[k].m[ratings[k]],rng);
  }
  const oracle =pick(L.oracles,rng);
  const suggest=pick(L.suggestions,rng);
  const rtitle =pick(L.readingTitles,rng);

  // Header
  const d=today,wday=L.dayNames[d.getDay()];
  const mNum=d.getMonth()+1, mName=L.monthNames[d.getMonth()];
  tx('r-date',  L.dateStr(wday, lang==='zh'?mNum:mName, d.getDate(), d.getFullYear()));
  tx('r-title', rtitle);

  $('r-signs').innerHTML=`
    <div class="badge">${wsEmoji} ${wsName}</div>
    <div class="badge">${czEmoji} ${lang==='zh'?czName+'年':L.yearOf(czName)}</div>
    <div class="badge">${moonEmoji} ${moonName}</div>`;

  // Category cards
  $('cat-grid').innerHTML=CAT_KEYS.map((k,i)=>`
    <div class="card cat-card fu d${i+1}">
      <div class="cat-head">
        <span class="cat-icon">${CAT_ICONS[i]}</span>
        <span class="cat-name">${L[k].name}</span>
      </div>
      ${dots(ratings[k])}
      <div class="r-lbl">${L.rLbls[ratings[k]]}</div>
      <div class="cat-msg">${msgs[k]}</div>
    </div>`).join('');

  tx('oracle-txt', oracle);
  tx('sug-txt',    suggest);
  tx('r-foot', `${wsEmoji} ${wsName} · ${czEmoji} ${lang==='zh'?czName+'年':L.yearOf(czName)}`);
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
function init(){
  applyStaticLang();
  const bday=localStorage.getItem('cosmic_bday');
  if(bday){show('reading');renderReading(bday);}
  else show('onboarding');
}

init();
</script>
