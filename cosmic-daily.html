<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cosmic Daily ✦</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --glass-bg: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.14);
      --card-bg: rgba(255,255,255,0.05);
      --card-border: rgba(255,255,255,0.10);
      --text-primary: rgba(255,255,255,0.95);
      --text-secondary: rgba(255,255,255,0.58);
      --text-muted: rgba(255,255,255,0.35);
      --accent: #c8a8ff;
      --accent-warm: #ffb8a0;
    }

    html, body {
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      color: var(--text-primary);
      background: #06000f;
      overflow-x: hidden;
    }

    /* ── BACKGROUND ─────────────────────────────────────── */
    .bg {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
    }
    .bg-mesh {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 90% 70% at 15% 15%, rgba(110,40,210,0.45) 0%, transparent 55%),
        radial-gradient(ellipse 60% 60% at 85% 8%,  rgba(30,80,210,0.35) 0%, transparent 55%),
        radial-gradient(ellipse 70% 60% at 75% 82%, rgba(190,40,110,0.28) 0%, transparent 55%),
        radial-gradient(ellipse 55% 55% at 5%  80%, rgba(30,110,190,0.28) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(80,20,160,0.20) 0%, transparent 60%),
        linear-gradient(150deg, #08001c 0%, #0b0b28 50%, #06000f 100%);
      animation: meshDrift 14s ease-in-out infinite alternate;
    }
    @keyframes meshDrift {
      0%   { filter: hue-rotate(0deg)  brightness(1);    transform: scale(1); }
      100% { filter: hue-rotate(18deg) brightness(1.06); transform: scale(1.04); }
    }
    .stars {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1.2px 1.2px at  8% 12%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1px   1px   at 22% 58%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 38%  7%, rgba(255,255,255,.6) 0%, transparent 100%),
        radial-gradient(1px   1px   at 52% 42%, rgba(255,255,255,.35)0%, transparent 100%),
        radial-gradient(2px   2px   at 65% 22%, rgba(255,255,255,.65)0%, transparent 100%),
        radial-gradient(1px   1px   at 80% 68%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1.2px 1.2px at 14% 82%, rgba(255,255,255,.55)0%, transparent 100%),
        radial-gradient(1px   1px   at 91% 13%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1.8px 1.8px at 30% 73%, rgba(255,255,255,.7) 0%, transparent 100%),
        radial-gradient(1px   1px   at 57% 88%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px   1px   at 76% 48%, rgba(255,255,255,.38)0%, transparent 100%),
        radial-gradient(1.4px 1.4px at 46% 28%, rgba(255,255,255,.62)0%, transparent 100%),
        radial-gradient(1px   1px   at  3% 47%, rgba(255,255,255,.32)0%, transparent 100%),
        radial-gradient(1px   1px   at 87% 38%, rgba(255,255,255,.48)0%, transparent 100%),
        radial-gradient(1.6px 1.6px at 19% 33%, rgba(255,255,255,.42)0%, transparent 100%),
        radial-gradient(1px   1px   at 68% 75%, rgba(255,255,255,.36)0%, transparent 100%),
        radial-gradient(2px   2px   at 43% 95%, rgba(255,255,255,.55)0%, transparent 100%),
        radial-gradient(1px   1px   at 95% 60%, rgba(255,255,255,.4) 0%, transparent 100%);
      animation: twinkle 7s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: .65; }
      100% { opacity: 1; }
    }

    /* ── LAYOUT ──────────────────────────────────────────── */
    .screen {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center;
      padding: env(safe-area-inset-top, 60px) 18px env(safe-area-inset-bottom, 40px);
    }
    .screen.hidden { display: none; }

    /* ── GLASS SURFACE ───────────────────────────────────── */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(28px) saturate(200%) brightness(1.1);
      -webkit-backdrop-filter: blur(28px) saturate(200%) brightness(1.1);
      border: 1px solid var(--glass-border);
      border-radius: 26px;
      box-shadow: 0 8px 40px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.12);
    }
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      box-shadow: 0 4px 20px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.07);
    }

    /* ── ONBOARDING ──────────────────────────────────────── */
    #onboarding {
      justify-content: center;
      gap: 28px;
      padding-top: 80px;
      padding-bottom: 60px;
    }
    .hero { text-align: center; }
    .app-icon {
      font-size: 76px;
      display: block;
      margin-bottom: 22px;
      filter: drop-shadow(0 0 28px rgba(200,168,255,.7));
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    .app-title {
      font-size: 38px; font-weight: 700; letter-spacing: -.6px;
      background: linear-gradient(130deg, #fff 0%, #c8a8ff 45%, #ffb8a0 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    .app-subtitle {
      font-size: 16px; color: var(--text-secondary);
      line-height: 1.6; max-width: 290px; margin: 0 auto;
    }
    .onboard-card {
      width: 100%; max-width: 370px; padding: 28px 26px;
    }
    .onboard-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .onboard-card p  { font-size: 14px; color: var(--text-secondary); line-height: 1.55; margin-bottom: 24px; }
    .field-label {
      font-size: 12px; font-weight: 600; letter-spacing: .8px;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;
    }
    .date-input {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      padding: 15px 18px;
      font-size: 17px; font-weight: 500; color: #fff;
      margin-bottom: 22px; outline: none;
      transition: border-color .2s, background .2s;
      -webkit-appearance: none; font-family: inherit;
      color-scheme: dark;
    }
    .date-input:focus {
      border-color: rgba(200,168,255,.55);
      background: rgba(255,255,255,.10);
    }
    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, rgba(200,168,255,.28), rgba(255,184,160,.18));
      border: 1px solid rgba(200,168,255,.38);
      backdrop-filter: blur(10px);
      color: #fff; font-size: 17px; font-weight: 600;
      padding: 16px; border-radius: 18px;
      cursor: pointer; transition: all .22s; font-family: inherit; letter-spacing: .2px;
    }
    .btn-primary:hover  { background: linear-gradient(135deg,rgba(200,168,255,.42),rgba(255,184,160,.28)); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(200,168,255,.22); }
    .btn-primary:active { transform: translateY(0); }

    /* ── READING HEADER ─────────────────────────────────── */
    #reading { gap: 14px; padding-top: 56px; padding-bottom: 48px; }
    .reading-header { width: 100%; max-width: 420px; text-align: center; margin-bottom: 4px; }
    .reading-date   { font-size: 12px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
    .reading-title  { font-size: 26px; font-weight: 700; letter-spacing: -.3px; }
    .signs-row      { display: flex; justify-content: center; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .badge {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.11);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 20px; padding: 5px 13px;
      font-size: 13px; color: var(--text-secondary);
      display: flex; align-items: center; gap: 5px;
    }

    /* ── CATEGORY GRID ──────────────────────────────────── */
    .cat-grid {
      width: 100%; max-width: 420px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .cat-card { padding: 17px 16px; display: flex; flex-direction: column; gap: 9px; }
    .cat-head { display: flex; align-items: center; gap: 8px; }
    .cat-icon { font-size: 21px; filter: drop-shadow(0 2px 6px rgba(200,168,255,.4)); }
    .cat-name { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .9px; }
    .dots     { display: flex; gap: 4px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,.13); transition: background .3s;
    }
    .dot.on { background: var(--dc); box-shadow: 0 0 6px var(--dc); }
    .rating-label { font-size: 11px; color: var(--text-muted); font-weight: 500; letter-spacing: .3px; }
    .cat-msg { font-size: 12.5px; color: var(--text-secondary); line-height: 1.55; }

    /* rating colour tokens */
    .r1 { --dc: #ff6b6b; } .r2 { --dc: #ffaa5a; } .r3 { --dc: #ffd166; }
    .r4 { --dc: #7ae7b8; } .r5 { --dc: #c8a8ff; }

    /* ── ORACLE CARD ────────────────────────────────────── */
    .oracle-card { width: 100%; max-width: 420px; padding: 24px 22px; }
    .oracle-lbl {
      font-size: 11px; font-weight: 600; letter-spacing: 1.6px;
      text-transform: uppercase; color: var(--accent); opacity: .8; margin-bottom: 14px;
    }
    .oracle-text { font-size: 16px; line-height: 1.7; color: var(--text-primary); }

    /* ── SUGGESTION CARD ────────────────────────────────── */
    .suggest-card {
      width: 100%; max-width: 420px; padding: 18px 20px;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .suggest-icon {
      width: 42px; height: 42px; flex-shrink: 0;
      background: rgba(200,168,255,.14); border-radius: 13px;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .suggest-lbl {
      font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--accent-warm); opacity: .8; margin-bottom: 6px;
    }
    .suggest-text { font-size: 14.5px; color: var(--text-secondary); line-height: 1.55; }

    /* ── FOOTER ─────────────────────────────────────────── */
    .reading-footer {
      width: 100%; max-width: 420px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 4px; margin-top: 2px;
    }
    .footer-info { font-size: 12px; color: var(--text-muted); }
    .btn-reset {
      background: none; border: none; font-size: 12px; color: var(--text-muted);
      cursor: pointer; font-family: inherit; text-decoration: underline;
      text-underline-offset: 2px; padding: 4px; transition: color .2s;
    }
    .btn-reset:hover { color: var(--text-secondary); }

    /* ── ANIMATIONS ─────────────────────────────────────── */
    .fade-up { animation: fadeUp .55s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .d0 { animation-delay: 0s;    }
    .d1 { animation-delay: .08s;  }
    .d2 { animation-delay: .16s;  }
    .d3 { animation-delay: .24s;  }
    .d4 { animation-delay: .32s;  }
    .d5 { animation-delay: .40s;  }
    .d6 { animation-delay: .48s;  }
    .d7 { animation-delay: .56s;  }
  </style>
</head>

// ═══════════════════════════════════════════════════════════════
//  ZODIAC & ASTRONOMY
// ═══════════════════════════════════════════════════════════════
function getWesternSign(m, d) {
  const signs = [
    ["Capricorn","♑"], ["Aquarius","♒"], ["Pisces","♓"],  ["Aries","♈"],
    ["Taurus","♉"],   ["Gemini","♊"],   ["Cancer","♋"],  ["Leo","♌"],
    ["Virgo","♍"],    ["Libra","♎"],    ["Scorpio","♏"], ["Sagittarius","♐"]
  ];
  const bounds = [
    [12,22],[1,20],[2,19],[3,21],[4,20],[5,21],[6,21],[7,23],[8,23],[9,23],[10,23],[11,22]
  ];
  for (let i = 0; i < 12; i++) {
    const [bm, bd] = bounds[i];
    const [nm, nd] = bounds[(i + 1) % 12];
    if (i === 11) { if ((m === 11 && d >= 22) || (m === 12 && d <= 21)) return signs[i]; }
    else          { if ((m === bm && d >= bd) || (m === nm && d <= nd - 1)) return signs[i]; }
  }
  return signs[0]; // fallback Capricorn
}

function getChineseSign(year) {
  const animals = ["Rat","Ox","Tiger","Rabbit","Dragon","Snake","Horse","Goat","Monkey","Rooster","Dog","Pig"];
  const emojis  = ["🐀","🐂","🐯","🐰","🐉","🐍","🐴","🐐","🐒","🐓","🐕","🐷"];
  const idx = ((year - 1900) % 12 + 12) % 12;
  return [animals[idx], emojis[idx]];
}

function getMoonPhase(date) {
  const d = new Date(date);
  const y = d.getFullYear(), mo = d.getMonth() + 1, day = d.getDate();
  const jd = 367*y - Math.floor(7*(y + Math.floor((mo+9)/12))/4)
           + Math.floor(275*mo/9) + day + 1721013.5;
  const knownNew = 2451549.5, cycle = 29.53058867;
  const phase = (((jd - knownNew) % cycle) + cycle) % cycle;
  const r = phase / cycle;
  const phases = [
    [.0625,"🌑","New Moon"],[.1875,"🌒","Waxing Crescent"],
    [.3125,"🌓","First Quarter"],[.4375,"🌔","Waxing Gibbous"],
    [.5625,"🌕","Full Moon"],[.6875,"🌖","Waning Gibbous"],
    [.8125,"🌗","Last Quarter"],[.9375,"🌘","Waning Crescent"]
  ];
  for (const [limit, emoji, name] of phases) if (r < limit) return [emoji, name];
  return ["🌑","New Moon"];
}

// ═══════════════════════════════════════════════════════════════
//  DETERMINISTIC RNG
// ═══════════════════════════════════════════════════════════════
function mkRng(seed) {
  let s = seed | 0;
  return () => {
    s ^= s << 13; s ^= s >> 17; s ^= s << 5;
    return (s >>> 0) / 0xffffffff;
  };
}

function dailySeed(bday, today) {
  const b = new Date(bday), t = new Date(today);
  const bv = b.getFullYear()*10000 + (b.getMonth()+1)*100 + b.getDate();
  const tv = t.getFullYear()*10000 + (t.getMonth()+1)*100 + t.getDate();
  return Math.abs((bv * 2654435769) ^ (tv * 2246822519)) % 0x7fffffff;
}

function pickRating(rng) {
  const r = rng();
  if (r < .10) return 1;
  if (r < .26) return 2;
  if (r < .54) return 3;
  if (r < .78) return 4;
  return 5;
}

function pick(arr, rng) { return arr[Math.floor(rng() * arr.length)]; }

// ═══════════════════════════════════════════════════════════════
//  RENDER HELPERS
// ═══════════════════════════════════════════════════════════════
const RLABELS = ["","Rough Waters","Murky Skies","Still Waters","Fair Winds","Star Aligned"];

function renderDots(rating) {
  let html = `<div class="dots r${rating}">`;
  for (let i = 1; i <= 5; i++)
    html += `<div class="dot${i <= rating ? ' on' : ''}"></div>`;
  return html + `</div><div class="rating-label">${RLABELS[rating]}</div>`;
}

//  APP
// ═══════════════════════════════════════════════════════════════
function init() {
  const saved = localStorage.getItem('cosmic_bday');
  if (saved) renderReading(saved);
  else       show('onboarding');
}

function show(id) {
  ['onboarding','reading'].forEach(s => document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function startReading() {
  const v = document.getElementById('bday-input').value;
  if (!v) { shake('bday-input'); return; }
  localStorage.setItem('cosmic_bday', v);
  renderReading(v);
}

function resetBday() {
  if (!confirm('Reset your birthday? The stars will need to meet you again.')) return;
  localStorage.removeItem('cosmic_bday');
  document.getElementById('bday-input').value = '';
  show('onboarding');
}

function shake(id) {
  const el = document.getElementById(id);
  el.style.borderColor = 'rgba(255,100,100,.6)';
  setTimeout(() => el.style.borderColor = '', 900);
}

function renderReading(bday) {
  show('reading');

  const birth = new Date(bday);
  const today = new Date();
  const bM = birth.getMonth() + 1, bD = birth.getDate(), bY = birth.getFullYear();

  const [wsName, wsEmoji]      = getWesternSign(bM, bD);
  const [czName, czEmoji]      = getChineseSign(bY);
  const [moonEmoji, moonName]  = getMoonPhase(today);

  const todayStr = today.toISOString().split('T')[0];
  const rng = mkRng(dailySeed(bday, todayStr));

  // Ratings
  const ratings = { work: pickRating(rng), love: pickRating(rng), health: pickRating(rng), finance: pickRating(rng) };

  // Messages
  const msgs = {};
  for (const k of ['work','love','health','finance'])
    msgs[k] = pick(C[k].m[ratings[k]], rng);

  const oracle  = pick(ORACLES, rng);
  const suggest = pick(SUGGESTIONS, rng);

  // Header
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const titles = ['Your Daily Reading','The Stars Speak','Today\'s Oracle','Cosmic Forecast','The Universe Weighs In'];

  document.getElementById('r-date').textContent =
    `${days[today.getDay()]}, ${months[today.getMonth()]} ${today.getDate()}, ${today.getFullYear()}`;
  document.getElementById('r-title').textContent = pick(titles, rng);
  document.getElementById('r-signs').innerHTML =
    `<div class="badge">${wsEmoji} ${wsName}</div>
     <div class="badge">${czEmoji} ${czName}</div>
     <div class="badge">${moonEmoji} ${moonName}</div>`;

  // Category cards
  const catKeys = ['work','love','health','finance'];
  const delays  = ['d1','d2','d3','d4'];
  document.getElementById('cat-grid').innerHTML = catKeys.map((k, i) => `
    <div class="glass-card cat-card fade-up ${delays[i]}">
      <div class="cat-head">
        <span class="cat-icon">${C[k].icon}</span>
        <span class="cat-name">${C[k].name}</span>
      </div>
      ${renderDots(ratings[k])}
      <div class="cat-msg">${msgs[k]}</div>
    </div>
  `).join('');

  document.getElementById('oracle-text').textContent  = oracle;
  document.getElementById('suggest-text').textContent = suggest;
  document.getElementById('r-footer').textContent = `${wsEmoji} ${wsName} · ${czEmoji} Year of the ${czName}`;
}

init();
