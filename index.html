<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cosmic Daily">
  <meta name="theme-color" content="#09080b">
  <link rel="apple-touch-icon" href="cosmic-daily-icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Cosmic Daily ✦</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    :root{
      --font-ui:  -apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
      --font-title:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
      --bg:      #09080b;
      --g0:      rgba(255,252,248,0.052);
      --gb:      rgba(255,252,248,0.088);
      --c0:      rgba(255,252,248,0.036);
      --cb:      rgba(255,252,248,0.066);
      --gold:    #c4a55a;
      --goldg:   rgba(196,165,90,0.22);
      --t1:      rgba(255,252,248,0.93);
      --t2:      rgba(255,252,248,0.50);
      --t3:      rgba(255,252,248,0.26);
      --glass-panel:
        linear-gradient(180deg,rgba(255,255,255,.095),rgba(255,255,255,.03)),
        linear-gradient(135deg,rgba(196,165,90,.11),transparent 38%,rgba(255,255,255,.045));
      --glass-panel-soft:
        linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.022)),
        linear-gradient(135deg,rgba(196,165,90,.08),transparent 40%,rgba(255,255,255,.03));
      --glass-chip:
        linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.028)),
        linear-gradient(135deg,rgba(196,165,90,.06),transparent 42%,rgba(255,255,255,.028));
      --glass-border: rgba(255,252,248,.096);
      --glass-border-soft: rgba(255,252,248,.08);
      --glass-inner: rgba(255,255,255,.10);
      --glass-inner-soft: rgba(255,255,255,.07);
      --glass-shadow-strong: 0 18px 46px rgba(0,0,0,.34),inset 0 1px 0 var(--glass-inner);
      --glass-shadow-soft: 0 10px 26px rgba(0,0,0,.24),inset 0 1px 0 var(--glass-inner-soft);
      --glass-shadow-hover: 0 16px 36px rgba(0,0,0,.26),inset 0 1px 0 var(--glass-inner);
      --glass-overlay: rgba(7,6,10,.52);
    }

    /* ── LIGHT / DAY MODE ────────────────────────── */
    html[data-theme="light"]{
      --bg:      #f5f0e8;
      --g0:      rgba(20,12,4,0.045);
      --gb:      rgba(20,12,4,0.110);
      --c0:      rgba(20,12,4,0.030);
      --cb:      rgba(20,12,4,0.085);
      --gold:    #a8821e;
      --goldg:   rgba(168,130,30,0.18);
      --t1:      rgba(20,12,4,0.88);
      --t2:      rgba(20,12,4,0.54);
      --t3:      rgba(20,12,4,0.34);
      --glass-panel:
        linear-gradient(180deg,rgba(255,255,255,.82),rgba(255,255,255,.46)),
        linear-gradient(135deg,rgba(168,130,30,.11),transparent 38%,rgba(255,255,255,.30));
      --glass-panel-soft:
        linear-gradient(180deg,rgba(255,255,255,.70),rgba(255,255,255,.34)),
        linear-gradient(135deg,rgba(168,130,30,.08),transparent 40%,rgba(255,255,255,.22));
      --glass-chip:
        linear-gradient(180deg,rgba(255,255,255,.68),rgba(255,255,255,.30)),
        linear-gradient(135deg,rgba(168,130,30,.07),transparent 42%,rgba(255,255,255,.18));
      --glass-border: rgba(20,12,4,.11);
      --glass-border-soft: rgba(20,12,4,.09);
      --glass-inner: rgba(255,255,255,.76);
      --glass-inner-soft: rgba(255,255,255,.62);
      --glass-shadow-strong: 0 14px 34px rgba(0,0,0,.10),inset 0 1px 0 var(--glass-inner);
      --glass-shadow-soft: 0 8px 22px rgba(0,0,0,.08),inset 0 1px 0 var(--glass-inner-soft);
      --glass-shadow-hover: 0 14px 30px rgba(0,0,0,.12),inset 0 1px 0 var(--glass-inner);
      --glass-overlay: rgba(245,240,232,.58);
    }

    /* smooth theme transition */
    html{transition:background .35s}
    body{transition:background .35s,color .35s}

    /* day background — warm sunrise sky instead of deep space */
    html[data-theme="light"] .bg-depth{
      background:
        radial-gradient(ellipse 80% 45% at 50% 115%, rgba(196,165,90,.18)  0%,transparent 55%),
        radial-gradient(ellipse 70% 50% at 50% -10%, rgba(255,230,160,.55) 0%,transparent 60%),
        radial-gradient(ellipse 35% 70% at 0%   50%, rgba(240,225,195,.25) 0%,transparent 55%),
        radial-gradient(ellipse 35% 70% at 100% 50%, rgba(240,225,195,.25) 0%,transparent 55%);
    }
    /* stars disappear in daylight */
    html[data-theme="light"] .bg-stars{opacity:0;transition:opacity .4s}

    /* app title gradient: light text reads poorly on parchment */
    html[data-theme="light"] .app-title{
      background:linear-gradient(135deg,rgba(20,12,4,.82) 0%,var(--gold) 52%,rgba(130,90,10,.80) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }

    /* section ratings need stronger contrast on light bg */
    html[data-theme="light"] .dot{
      background:rgba(20,12,4,.22);
      box-shadow:inset 0 0 0 1px rgba(20,12,4,.08);
    }
    html[data-theme="light"] .dot.on{
      background:#8f6a18;
      box-shadow:
        0 0 0 1px rgba(255,248,236,.92),
        0 0 0 2px rgba(143,106,24,.18),
        0 3px 10px rgba(143,106,24,.22);
    }
    html[data-theme="light"] .r-lbl{color:rgba(20,12,4,.62)}

    /* date input on light bg */
    html[data-theme="light"] .date-input{
      background:var(--glass-chip);border-color:rgba(20,12,4,.14);
      color:rgba(20,12,4,.88);color-scheme:light;
      box-shadow:var(--glass-shadow-soft);
    }
    html[data-theme="light"] .date-input:focus{
      border-color:rgba(168,130,30,.55);background:var(--glass-panel-soft);
    }

    html,body{
      min-height:100%;background:var(--bg);
      font-family:var(--font-ui);
      color:var(--t1);overflow-x:hidden;
    }
    html[lang^="en"]{
      --font-ui: "Iowan Old Style","Palatino Linotype","Book Antiqua","Baskerville","Times New Roman",serif;
      --font-title: "Baskerville","Iowan Old Style","Palatino Linotype","Book Antiqua","Times New Roman",serif;
    }
    html[lang^="zh"]{
      --font-ui: -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Noto Sans CJK SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
      --font-title: -apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Noto Sans CJK SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
    }
    body.modal-open{overflow:hidden}

    /* ── BACKGROUND ───────────────────────────── */
    .bg{position:fixed;inset:0;z-index:0;pointer-events:none}

    .bg-depth{
      position:absolute;inset:0;
      background:
        radial-gradient(ellipse 80% 45% at 50% 115%, rgba(170,130,35,.07)  0%,transparent 55%),
        radial-gradient(ellipse 65% 40% at 50% -8%,  rgba(25,20,42,.50)   0%,transparent 55%),
        radial-gradient(ellipse 30% 70% at 0%   50%, rgba(18,14,30,.30)   0%,transparent 55%),
        radial-gradient(ellipse 30% 70% at 100% 50%, rgba(18,14,30,.30)   0%,transparent 55%);
      animation:breathe 18s ease-in-out infinite alternate;
    }
    @keyframes breathe{0%{opacity:.82}100%{opacity:1}}

    .bg-stars{
      position:absolute;inset:0;
      background-image:
        radial-gradient(1.2px 1.2px at  9% 17%, rgba(255,252,248,.42) 0%,transparent 100%),
        radial-gradient(1.6px 1.6px at 28% 63%, rgba(255,252,248,.32) 0%,transparent 100%),
        radial-gradient(1px   1px   at 43%  8%, rgba(255,252,248,.38) 0%,transparent 100%),
        radial-gradient(2px   2px   at 62% 27%, rgba(255,252,248,.48) 0%,transparent 100%),
        radial-gradient(1px   1px   at 80% 72%, rgba(255,252,248,.28) 0%,transparent 100%),
        radial-gradient(1.4px 1.4px at 17% 85%, rgba(255,252,248,.40) 0%,transparent 100%),
        radial-gradient(1px   1px   at 91% 14%, rgba(255,252,248,.25) 0%,transparent 100%),
        radial-gradient(1.8px 1.8px at 37% 78%, rgba(255,252,248,.52) 0%,transparent 100%),
        radial-gradient(1px   1px   at 71% 44%, rgba(255,252,248,.30) 0%,transparent 100%),
        radial-gradient(1.2px 1.2px at 54% 91%, rgba(255,252,248,.36) 0%,transparent 100%);
      animation:twinkle 9s ease-in-out infinite alternate;
    }
    @keyframes twinkle{0%{opacity:.60}100%{opacity:1}}

    /* ── LANG + THEME TOGGLES ────────────────── */
    .lang-btn,.theme-btn{
      position:fixed;top:max(18px,env(safe-area-inset-top,18px));z-index:200;
      background:var(--glass-chip);border:1px solid var(--glass-border-soft);
      backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);
      border-radius:20px;padding:6px 14px;
      font-size:13px;font-weight:500;color:var(--t2);
      cursor:pointer;font-family:inherit;transition:all .2s;letter-spacing:.4px;
      box-shadow:var(--glass-shadow-soft);
    }
    .lang-btn {right:18px}
    .theme-btn{left:18px;font-size:15px;padding:5px 11px;letter-spacing:0}
    .lang-btn:hover,.lang-btn:focus-visible,
    .theme-btn:hover,.theme-btn:focus-visible{
      background:var(--glass-panel-soft);
      border-color:rgba(196,165,90,.24);
      color:var(--t1);
      transform:translateY(-1px);
      outline:none;
    }

    /* ── GLASS ────────────────────────────────── */
    .glass{
      background:var(--glass-panel);
      backdrop-filter:blur(30px) saturate(180%) brightness(1.08);
      -webkit-backdrop-filter:blur(30px) saturate(180%) brightness(1.08);
      border:1px solid var(--glass-border);border-radius:26px;
      box-shadow:var(--glass-shadow-strong);
    }
    .card{
      background:var(--glass-panel-soft);
      backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);
      border:1px solid var(--glass-border-soft);border-radius:22px;
      box-shadow:var(--glass-shadow-soft);
    }

    /* ── LAYOUT ───────────────────────────────── */
    .screen{
      position:relative;z-index:1;min-height:100dvh;
      display:flex;flex-direction:column;align-items:center;
      padding:max(56px,env(safe-area-inset-top,56px)) 18px max(40px,env(safe-area-inset-bottom,40px));
    }
    .screen.hidden{display:none}

    /* ── ONBOARDING ───────────────────────────── */
    #onboarding{justify-content:center;gap:30px;padding-top:90px;padding-bottom:60px}

    .hero{text-align:center}
    .app-icon{
      font-size:68px;display:block;margin-bottom:22px;
      filter:drop-shadow(0 0 22px rgba(196,165,90,.55));
      animation:floatY 4.5s ease-in-out infinite;
    }
    @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-11px)}}

    .app-title{
      font-family:var(--font-title);
      font-size:36px;font-weight:700;letter-spacing:-.5px;margin-bottom:12px;
      background:linear-gradient(135deg,rgba(255,252,248,.96) 0%,var(--gold) 55%,rgba(255,232,180,.85) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    html[lang^="en"] .app-title{letter-spacing:.02em}
    .app-sub{font-size:15.5px;color:var(--t2);line-height:1.62;max-width:285px;margin:0 auto}

    .ob-card{width:100%;max-width:375px;padding:28px 26px}
    .ob-card h2{font-family:var(--font-title);font-size:19px;font-weight:600;margin-bottom:7px;color:var(--t1)}
    .ob-card p {font-size:14px;color:var(--t2);line-height:1.55;margin-bottom:24px}

    .field-lbl{font-size:11.5px;font-weight:600;letter-spacing:.9px;text-transform:uppercase;color:var(--t3);margin-bottom:8px}

    .date-input{
      width:100%;background:var(--glass-chip);
      border:1px solid var(--glass-border);border-radius:16px;
      padding:15px 18px;font-size:17px;font-weight:500;color:#fff;
      margin-bottom:22px;outline:none;
      transition:border-color .2s,background .2s;
      -webkit-appearance:none;font-family:inherit;color-scheme:dark;
      box-shadow:var(--glass-shadow-soft);
    }
    .date-input:focus{border-color:rgba(196,165,90,.50);background:var(--glass-panel-soft)}

    .btn-reveal{
      width:100%;
      background:linear-gradient(135deg,rgba(196,165,90,.22),rgba(196,165,90,.12));
      border:1px solid rgba(196,165,90,.38);
      backdrop-filter:blur(10px);color:var(--t1);
      font-size:16px;font-weight:600;padding:16px;border-radius:18px;
      cursor:pointer;transition:all .22s;font-family:inherit;letter-spacing:.3px;
    }
    .btn-reveal:hover{background:linear-gradient(135deg,rgba(196,165,90,.34),rgba(196,165,90,.20));transform:translateY(-1px);box-shadow:0 8px 28px var(--goldg)}
    .btn-reveal:active{transform:translateY(0)}

    /* ── READING ──────────────────────────────── */
    #reading{gap:13px;padding-top:58px;padding-bottom:48px}

    .r-header{width:100%;max-width:430px;text-align:center;margin-bottom:4px}
    .r-date  {font-size:11.5px;color:var(--t3);letter-spacing:1.6px;text-transform:uppercase;margin-bottom:6px}
    .r-title {font-family:var(--font-title);font-size:25px;font-weight:700;letter-spacing:-.3px}
    html[lang^="en"] .r-title{letter-spacing:.01em}
    .signs-row{display:flex;justify-content:center;gap:7px;margin-top:13px;flex-wrap:wrap}

    .badge{
      background:var(--glass-chip);border:1px solid var(--glass-border-soft);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border-radius:20px;padding:5px 13px;font-size:13px;color:var(--t2);
      display:flex;align-items:center;gap:5px;
      box-shadow:var(--glass-shadow-soft);
    }
    .badge-btn{
      border:none;cursor:pointer;font-family:inherit;text-align:left;
      transition:transform .22s ease,border-color .22s ease,background .22s ease,box-shadow .22s ease,color .22s ease;
    }
    .badge-btn:hover,.badge-btn:focus-visible{
      transform:translateY(-1px);
      border-color:rgba(196,165,90,.26);
      background:rgba(255,252,248,.08);
      color:var(--t1);
      box-shadow:0 10px 24px rgba(0,0,0,.16);
      outline:none;
    }

    .almanac-summary{
      width:100%;max-width:430px;padding:15px 15px 14px;
      display:flex;flex-direction:column;gap:10px;
    }
    .almanac-summary-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .almanac-summary-kicker{font-size:11px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--gold);opacity:.82}
    .almanac-summary-title{font-family:var(--font-title);font-size:18px;font-weight:700;color:var(--t1);line-height:1.18;margin-top:2px}
    .almanac-summary-more{font-size:11px;color:var(--t3);padding-top:3px;white-space:nowrap}
    .almanac-summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
    .almanac-summary-item{
      padding:10px 9px;border-radius:16px;
      background:var(--glass-chip);border:1px solid var(--glass-border-soft);
      box-shadow:var(--glass-shadow-soft);
    }
    .almanac-summary-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold);opacity:.76;margin-bottom:4px}
    .almanac-summary-value{font-size:12px;line-height:1.28;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ── CATEGORY GRID ────────────────────────── */
    .cat-grid{width:100%;max-width:430px;display:grid;grid-template-columns:1fr 1fr;gap:11px}
    .cat-card{padding:17px 15px;display:flex;flex-direction:column;gap:9px}
    .cat-head{display:flex;align-items:center;gap:8px}
    .cat-icon{font-size:20px;filter:drop-shadow(0 2px 5px rgba(196,165,90,.35))}
    .cat-name{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.9px}
    .dots    {display:flex;gap:4px}
    .dot     {width:7px;height:7px;border-radius:50%;background:rgba(255,252,248,.12);transition:background .3s}
    .dot.on  {background:var(--gold);box-shadow:0 0 8px rgba(196,165,90,.40)}
    .r-lbl   {font-size:11px;color:var(--t3);font-weight:500;letter-spacing:.3px}
    .cat-msg {font-size:12.5px;color:var(--t2);line-height:1.55}

    /* ── ORACLE ───────────────────────────────── */
    .oracle-card{width:100%;max-width:430px;padding:24px 22px}
    .oracle-lbl {font-size:11px;font-weight:600;letter-spacing:1.7px;text-transform:uppercase;color:var(--gold);opacity:.80;margin-bottom:14px}
    .oracle-txt {font-size:15.5px;line-height:1.72;color:var(--t1)}
    html[lang^="en"] .oracle-txt,
    html[lang^="en"] .cat-msg,
    html[lang^="en"] .sug-txt,
    html[lang^="en"] .detail-copy p{
      letter-spacing:.01em;
    }

    /* ── SUGGESTION ───────────────────────────── */
    .sug-card{width:100%;max-width:430px;padding:18px 20px;display:flex;align-items:flex-start;gap:13px}
    .sug-icon{
      width:42px;height:42px;flex-shrink:0;
      background:rgba(196,165,90,.12);border:1px solid rgba(196,165,90,.22);
      border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;
    }
    .sug-lbl {font-size:11px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;color:var(--gold);opacity:.75;margin-bottom:6px}
    .sug-txt {font-size:14px;color:var(--t2);line-height:1.58}

    /* ── FOOTER ───────────────────────────────── */
    .r-footer{width:100%;max-width:430px;display:flex;justify-content:space-between;align-items:center;padding:6px 4px;margin-top:3px}
    .r-foot-info{font-size:12px;color:var(--t3)}
    .btn-reset{background:none;border:none;font-size:12px;color:var(--t3);cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:2px;padding:4px;transition:color .2s}
    .btn-reset:hover{color:var(--t2)}

    .interactive-card{
      cursor:pointer;
      transition:transform .22s ease,border-color .22s ease,box-shadow .22s ease,background .22s ease;
      position:relative;
      overflow:hidden;
    }
    .interactive-card::after{
      content:"";
      position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.08),transparent 40%,transparent 62%,rgba(196,165,90,.08));
      opacity:0;transition:opacity .22s ease;
      pointer-events:none;
    }
    .interactive-card:hover,.interactive-card:focus-visible{
      transform:translateY(-2px);
      border-color:rgba(196,165,90,.28);
      box-shadow:var(--glass-shadow-hover);
      outline:none;
    }
    .interactive-card:hover::after,.interactive-card:focus-visible::after{opacity:1}

    /* ── DETAIL POPUP ─────────────────────────── */
    .detail-modal{
      position:fixed;inset:0;z-index:500;
      display:flex;align-items:center;justify-content:center;
      padding:max(24px,env(safe-area-inset-top,24px)) 14px max(24px,env(safe-area-inset-bottom,24px));
      background:var(--glass-overlay);
      backdrop-filter:blur(24px) saturate(140%);
      -webkit-backdrop-filter:blur(24px) saturate(140%);
      opacity:0;pointer-events:none;
      transition:opacity .24s ease;
    }
    .detail-modal.open{opacity:1;pointer-events:auto}
    .detail-sheet{
      width:min(100%,540px);max-height:min(84vh,760px);
      overflow:auto;padding:26px 22px 22px;border-radius:30px;position:relative;
      background:var(--glass-panel);
      border:1px solid var(--glass-border);
      box-shadow:var(--glass-shadow-strong);
      transform:scale(.96);
      transition:transform .28s cubic-bezier(.2,.8,.2,1);
    }
    .detail-modal.open .detail-sheet{transform:scale(1)}
    .detail-close{
      position:absolute;top:16px;right:16px;
      width:36px;height:36px;border:none;border-radius:50%;
      background:var(--glass-chip);color:var(--t1);cursor:pointer;
      font-size:17px;font-family:inherit;transition:background .2s ease,transform .2s ease;
      box-shadow:var(--glass-shadow-soft);
    }
    .detail-close:hover,.detail-close:focus-visible{background:var(--glass-panel-soft);transform:scale(1.04);outline:none}
    .detail-kicker{font-size:11px;font-weight:700;letter-spacing:1.7px;text-transform:uppercase;color:var(--gold);opacity:.84;margin-bottom:10px}
    .detail-title{font-family:var(--font-title);font-size:30px;line-height:1.08;letter-spacing:-.5px;margin-right:42px}
    html[lang^="en"] .detail-title{letter-spacing:.01em}
    .detail-sub{font-size:14px;color:var(--t2);line-height:1.55;margin-top:10px}
    .detail-facts{display:flex;flex-wrap:wrap;gap:8px;margin:18px 0 16px}
    .detail-pill{
      padding:8px 12px;border-radius:999px;
      background:var(--glass-chip);border:1px solid var(--glass-border-soft);
      color:var(--t2);font-size:12px;letter-spacing:.2px;
      box-shadow:var(--glass-shadow-soft);
    }
    .detail-custom{display:none}
    .detail-copy{display:flex;flex-direction:column;gap:12px}
    .detail-copy p{font-size:16px;line-height:1.72;color:var(--t1)}
    .detail-copy p strong{color:var(--t1)}

    .almanac-shell{display:flex;flex-direction:column;gap:14px}

      color:var(--t2);font-size:13px;
      box-shadow:var(--glass-shadow-soft);
    }
    .almanac-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .almanac-tab{
      border:none;cursor:pointer;text-align:left;font-family:inherit;
      padding:12px 11px;border-radius:18px;
      background:var(--glass-panel-soft);border:1px solid var(--glass-border-soft);
      color:var(--t2);box-shadow:var(--glass-shadow-soft);
      transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease,background .22s ease,color .22s ease;

      transform:translateY(-1px);
      border-color:rgba(196,165,90,.26);
      color:var(--t1);
      outline:none;
    }
    .almanac-tab.active{
      background:var(--glass-panel);
      border-color:rgba(196,165,90,.30);
      color:var(--t1);
      box-shadow:var(--glass-shadow-hover);
    }

      box-shadow:var(--glass-shadow-soft);
    }

    .almanac-active-note{font-size:14px;line-height:1.68;color:var(--t2)}

    .almanac-yi-text{font-size:15px;line-height:1.7;color:var(--t1)}

  </style>
</head>

// Julian Day Number for a given Date object
function julianDay(date){
  const y=date.getFullYear(),mo=date.getMonth()+1,day=date.getDate();
  const A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(mo+1))+day+B-1524.5;
}

// Moon mean longitude (degrees 0-360), good to ~1° for sign placement
function moonMeanLongitude(date){
  const T=(julianDay(date)-2451545.0)/36525;
  const L=218.3164477+481267.88123421*T-0.0015786*T*T;
  return((L%360)+360)%360;
}

// Sun apparent longitude (degrees 0-360) with equation of center
function sunLongitude(date){
  const T=(julianDay(date)-2451545.0)/36525;
  let L0=280.46646+36000.76983*T;L0=((L0%360)+360)%360;
  let M=357.52911+35999.05029*T-0.0001537*T*T;M=((M%360)+360)%360;
  const Mr=M*Math.PI/180;
  const C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(Mr)
         +(0.019993-0.000101*T)*Math.sin(2*Mr)
         +0.000289*Math.sin(3*Mr);
  return((L0+C)%360+360)%360;
}

// Aspect between two sign indices (0-11 in longitude order)
function getAspect(s1,s2){
  const diff=Math.abs(s1-s2);
  const angle=Math.min(diff,12-diff)*30;
  if(angle===0)  return'conjunction';
  if(angle===120)return'trine';
  if(angle===60) return'sextile';
  if(angle===90) return'square';
  if(angle===180)return'opposition';
  return'neutral';
}

function westIdx(m,d){
  const b=[[12,22],[1,20],[2,19],[3,21],[4,20],[5,21],[6,21],[7,23],[8,23],[9,23],[10,23],[11,22]];
  for(let i=0;i<12;i++){
    const[bm,bd]=b[i],[nm,nd]=b[(i+1)%12];
    if(i===11){if((m===11&&d>=22)||(m===12&&d<=21))return i;}
    else if((m===bm&&d>=bd)||(m===nm&&d<=nd-1))return i;
  }
  return 0;
}

function chiIdx(y){return((y-1900)%12+12)%12}

function moonIdx(date){
  const d=new Date(date),y=d.getFullYear(),mo=d.getMonth()+1,day=d.getDate();
  const jd=367*y-Math.floor(7*(y+Math.floor((mo+9)/12))/4)+Math.floor(275*mo/9)+day+1721013.5;
  const phase=(((jd-2451549.5)%29.53058867)+29.53058867)%29.53058867/29.53058867;
  const t=[.0625,.1875,.3125,.4375,.5625,.6875,.8125,.9375];
  for(let i=0;i<8;i++)if(phase<t[i])return i;
  return 0;
}

function mkRng(seed){
  let s=seed|0;
  return()=>{s^=s<<13;s^=s>>17;s^=s<<5;return(s>>>0)/0xffffffff};
}
function dailySeed(bday,today){
  const b=new Date(bday),t=new Date(today);
  const bv=b.getFullYear()*10000+(b.getMonth()+1)*100+b.getDate();
  const tv=t.getFullYear()*10000+(t.getMonth()+1)*100+t.getDate();
  return Math.abs((bv*2654435769)^(tv*2246822519))%0x7fffffff;
}
// Real astrological rating engine — replaces pure-RNG pickRating
function calcRatings(bdayStr,todayDate,rng){
  const birth=new Date(bdayStr);
  const bWI=westIdx(birth.getMonth()+1,birth.getDate());
  // Convert birth sign from westIdx order → longitude order (Ari=0…Pis=11)
  const birthLon=(bWI-3+12)%12;

  // Moon sign (longitude order)
  const moonLon=moonMeanLongitude(todayDate);
  const moonSignIdx=Math.floor(moonLon/30)%12;

  // Moon phase index (0=new…4=full…7=waning crescent)
  const mi=moonIdx(todayDate);
  const isWaxing=mi<4;

  // Moon sign element (fire/earth/air/water cycle every 3 signs)
  const elements=['fire','earth','air','water'];
  const moonElem=elements[moonSignIdx%4];

  // Planetary day ruler: 0=Sun,1=Moon,2=Mars,3=Mercury,4=Jupiter,5=Venus,6=Saturn
  const dow=todayDate.getDay();

  // Birth ↔ Moon aspect modifier
  const asp=getAspect(birthLon,moonSignIdx);
  const aspMod=(asp==='trine'||asp==='sextile')?0.5:(asp==='square'||asp==='opposition')?-0.5:0;

  // ── WORK ──────────────────────────────────────────────────────
  let work=3.0;
  if(dow===3)work+=0.9; // Mercury (Wed) boosts work
  if(dow===0)work+=0.4; // Sun (Sun)
  if(dow===6)work+=0.4; // Saturn (Sat)
  if(dow===1)work-=0.3; // Moon (Mon) dampens
  if(moonElem==='fire')work+=0.2;
  work+=aspMod;
  work+=(rng()-0.5)*0.5; // ±0.25 micro-variation

  // ── LOVE ──────────────────────────────────────────────────────
  let love=3.0;
  if(dow===5)love+=1.0; // Venus (Fri)
  if(dow===1)love+=0.5; // Moon (Mon)
  if(dow===6)love-=0.3; // Saturn (Sat)
  if(mi===4) love+=0.5; // Full moon = love peak
  if(moonElem==='water')love+=0.3;
  love+=aspMod;
  love+=(rng()-0.5)*0.5;

  // ── HEALTH ────────────────────────────────────────────────────
  const healthPhase=[-0.9,-0.1,0.4,0.7,1.1,0.3,-0.5,-0.8];
  let health=3.0+healthPhase[mi];
  if(dow===0)health+=0.4; // Sun boosts vitality
  if(dow===6)health-=0.3; // Saturn drains
  if(moonElem==='water')health+=0.2;
  health+=aspMod;
  health+=(rng()-0.5)*0.5;

  // ── FINANCE ───────────────────────────────────────────────────
  let finance=3.0;
  if(dow===4)finance+=1.1; // Jupiter (Thu)
  if(dow===3)finance+=0.5; // Mercury (Wed)
  if(dow===2)finance-=0.3; // Mars (Tue)
  finance+=isWaxing?0.5:-0.3;
  if(moonElem==='earth')finance+=0.3;
  finance+=aspMod;
  finance+=(rng()-0.5)*0.5;

  const clamp=v=>Math.max(1,Math.min(5,Math.round(v)));
  return{work:clamp(work),love:clamp(love),health:clamp(health),finance:clamp(finance),
         moonSignIdx,asp};
}
function pick(arr,rng){return arr[Math.floor(rng()*arr.length)]}

function escapeHtml(v){
  return String(v)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

  setBlockText('detail-sub',payload.subtitle);

  const facts=payload.facts||[];
  $('detail-facts').innerHTML=facts.map(f=>`<span class="detail-pill">${escapeHtml(f)}</span>`).join('');
  $('detail-facts').style.display=facts.length?'flex':'none';

  const custom=$('detail-custom');
  custom.innerHTML='';
  custom.style.display='none';
  if(payload.custom && payload.custom.type==='almanac'){
    renderAlmanacCustom(payload.custom);
    custom.style.display='block';
  }

  const copy=$('detail-copy');
  copy.innerHTML='';
  (payload.paragraphs||[]).filter(Boolean).forEach(text=>{
    const p=document.createElement('p');
    p.textContent=text;
    copy.appendChild(p);
  });
  copy.style.display=copy.childElementCount?'flex':'none';
}

  if(!payload)return;
  applyDetail(payload);
  $('detail-modal').classList.add('open');
  $('detail-modal').setAttribute('aria-hidden','false');
  document.body.classList.add('modal-open');
  requestAnimationFrame(()=>$('detail-close').focus());
}

function closeDetail(){
  const wasOpen=$('detail-modal').classList.contains('open');
  $('detail-modal').classList.remove('open');
  $('detail-modal').setAttribute('aria-hidden','true');
  document.body.classList.remove('modal-open');
  if(wasOpen && lastDetailTrigger && document.contains(lastDetailTrigger))lastDetailTrigger.focus();
}

  return lang==='zh'
    ?LANG.zh.westNames[idx]
    :LANG.en.westNames[idx];
}

function displayChineseZodiacName(idx){
  return lang==='zh'
    ?`${LANG.zh.chiNames[idx]}年`
    :LANG.en.yearOf(LANG.en.chiNames[idx]);
}

function displayMoonSignName(idx){
  return lang==='zh'
    ?LANG.zh.zodiacNames[idx]
    :LANG.en.zodiacNames[idx];
}

function getAlmanacPack(){
  return lang==='zh'?ALMANAC_ZH:ALMANAC_EN;
}

function buildAlmanacAdvice(){
  const pack=getAlmanacPack();
  const phase=pack.phase[readingState.phaseIdx];
  const sign=pack.sign[readingState.moonSignIdx];
  const day=pack.day[readingState.dayIdx];
  const west=pack.west[readingState.westIdx];
  const zodiac=pack.chinese[readingState.chineseIdx];
  if(lang==='zh'){
    return{
      yi:`${phase.yi}；以${sign.yi}为方法，借${day.yi}推进，兼顾${west.yi}与${zodiac.yi}。`,
      ji:`${phase.ji}；少做${sign.ji}，避免${day.ji}，尤其别让${west.ji}和${zodiac.ji}叠在一起。`
    };
  }
  return{
    yi:`${phase.yi}; use ${sign.yi}, lean on ${day.yi}, and keep ${west.yi} with ${zodiac.yi}.`,
    ji:`${phase.ji}; avoid ${sign.ji}, watch ${day.ji}, and do not let ${west.ji} combine with ${zodiac.ji}.`
  };
}

function buildAlmanacDetail(activeTab='phase'){

function getDetailPayload(type,key){
  if(!readingState)return null;
  switch(type){
    case 'almanac': return buildAlmanacDetail('phase');
    case 'western': return buildWesternDetail(Number(key));
    case 'chinese': return buildChineseDetail(Number(key));
    case 'moon-phase': return buildAlmanacDetail('phase');
    case 'moon-sign': return buildAlmanacDetail('moonSign');
    case 'planet-day': return buildAlmanacDetail('day');
    case 'astro': return buildAlmanacDetail('phase');
    case 'category': return buildCategoryDetail(key);
    case 'oracle': return buildOracleDetail();
    case 'suggestion': return buildSuggestionDetail();
    default: return null;
  }
}

function activateDetailTrigger(node){
  const payload=getDetailPayload(node.dataset.detail,node.dataset.key);
  if(payload){
    lastDetailTrigger=node;
    openDetail(payload);
  }
}

function onReadingClick(e){
  const trigger=e.target.closest('[data-detail]');
  if(trigger)activateDetailTrigger(trigger);
}

function onReadingKeydown(e){
  const trigger=e.target.closest('[data-detail]');
  if(trigger && isActionKey(e)){
    e.preventDefault();
    activateDetailTrigger(trigger);
  }
}

function renderReading(bday){
  const L=LANG[lang];
  applyStaticLang();

  const birth=new Date(bday),today=new Date();
  const bM=birth.getMonth()+1,bD=birth.getDate(),bY=birth.getFullYear();

  const wi=westIdx(bM,bD), ci=chiIdx(bY), mi=moonIdx(today);
  const wsEmoji=WEST_EMOJI[wi], czEmoji=CHI_EMOJI[ci], moonEmoji=MOON_EMOJI[mi];
  const wsName=L.westNames[wi], czName=L.chiNames[ci], moonName=L.moonNames[mi];

  const todayStr=today.toISOString().split('T')[0];
  const rng=mkRng(dailySeed(bday,todayStr));

  // Real astrological ratings
  const calc=calcRatings(bday,today,rng);
  const ratings={work:calc.work,love:calc.love,health:calc.health,finance:calc.finance};

  // Messages (one random pick per category per day)
  const msgs={};
  for(const k of CAT_KEYS) msgs[k]=pick(L[k].m[ratings[k]],rng);
  const oracle =pick(L.oracles,rng);
  const suggest=pick(L.suggestions,rng);
  const rtitle =pick(L.readingTitles,rng);

  // Moon sign badge
  const moonSignName =L.zodiacNames[calc.moonSignIdx];
  const moonSignEmoji=ZODIAC_EMOJI[calc.moonSignIdx];

  // Planetary day badge
  const planetName =L.planetNames[today.getDay()];
  const planetEmoji=PLANET_EMOJI[today.getDay()];
  const planetDayLabel=lang==='zh'?`${planetName}日`:`${planetName} Day`;

  // Astrological basis label for detail views
  const aspName=L.aspectNames[calc.asp];
  const moonInLabel=lang==='zh'
    ?`月亮${aspName?aspName+'相·':''}月入${moonSignName}`
    :`Moon${aspName?' '+aspName+' natal ·':''} Moon in ${moonSignName}`;

  readingState={
    birthYear:bY,
    ratings,
    msgs,
    oracle,
    suggest,
    phaseIdx:mi,
    dayIdx:today.getDay(),
    aspect:calc.asp,
    westIdx:wi,
    chineseIdx:ci,
    moonSignIdx:calc.moonSignIdx,
    moonInLabel,
    planetDayLabel
  };

  // Header
  const d=today,wday=L.dayNames[d.getDay()];
  const mNum=d.getMonth()+1, mName=L.monthNames[d.getMonth()];
  tx('r-date',  L.dateStr(wday, lang==='zh'?mNum:mName, d.getDate(), d.getFullYear()));
  tx('r-title', rtitle);

  $('r-signs').innerHTML=`
    <button type="button" class="badge badge-btn" data-detail="western" data-key="${wi}">${wsEmoji} ${wsName}</button>
    <button type="button" class="badge badge-btn" data-detail="chinese" data-key="${ci}">${czEmoji} ${lang==='zh'?czName+'年':L.yearOf(czName)}</button>`;

  $('almanac-summary').innerHTML=`
    <div class="almanac-summary-head">
      <div>
        <div class="almanac-summary-kicker">${lang==='zh'?'今日宜忌':'Daily Almanac'}</div>
        <div class="almanac-summary-title">${lang==='zh'?'今日天象':'Today’s Sky'}</div>
      </div>
      <div class="almanac-summary-more">${lang==='zh'?'点击展开':'Tap to open'}</div>
    </div>
    <div class="almanac-summary-grid">
      <div class="almanac-summary-item">
        <div class="almanac-summary-label">${lang==='zh'?'月相':'Moon'}</div>
        <div class="almanac-summary-value">${moonEmoji} ${moonName}</div>
      </div>
      <div class="almanac-summary-item">
        <div class="almanac-summary-label">${lang==='zh'?'月入':'Moon In'}</div>
        <div class="almanac-summary-value">🌙 ${lang==='zh'?moonSignName:`${moonSignName}`}</div>
      </div>
      <div class="almanac-summary-item">
        <div class="almanac-summary-label">${lang==='zh'?'今日':'Day'}</div>
        <div class="almanac-summary-value">${planetEmoji} ${planetDayLabel}</div>
      </div>
    </div>`;

  // Category cards
  $('cat-grid').innerHTML=CAT_KEYS.map((k,i)=>`
    <div class="card cat-card interactive-card fu d${i+1}" tabindex="0" role="button" data-detail="category" data-key="${k}">
      <div class="cat-head">
        <span class="cat-icon">${CAT_ICONS[i]}</span>
        <span class="cat-name">${L[k].name}</span>
      </div>
      ${dots(ratings[k])}
      <div class="r-lbl">${L.rLbls[ratings[k]]}</div>
      <div class="cat-msg">${msgs[k]}</div>
    </div>`).join('');

  tx('oracle-txt', oracle);
  tx('sug-txt',    suggest);
  tx('r-foot', `${wsEmoji} ${wsName} · ${czEmoji} ${lang==='zh'?czName+'年':L.yearOf(czName)}`);
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
function init(){
  applyTheme(theme);
  applyStaticLang();
  $('reading').addEventListener('click',onReadingClick);
  $('reading').addEventListener('keydown',onReadingKeydown);
  $('detail-modal').addEventListener('click',e=>{
    if(e.target===$('detail-modal'))closeDetail();
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape' && $('detail-modal').classList.contains('open'))closeDetail();
  });
  const bday=localStorage.getItem('cosmic_bday');
  if(bday){show('reading');renderReading(bday);}
  else show('onboarding');
}

init();
</script>
