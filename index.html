<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="A bilingual daily oracle blending zodiac signs, moon phase, weekday ruler, and personal daily guidance.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cosmic Almanac">
  <meta name="theme-color" content="#09080b">
  <meta property="og:title" content="Cosmic Almanac">
  <meta property="og:description" content="A bilingual daily oracle blending zodiac signs, moon phase, weekday ruler, and personal daily guidance.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://alanwongsai.github.io/CosmicAlmanac/">
  <meta property="og:site_name" content="Cosmic Almanac">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Cosmic Almanac">
  <meta name="twitter:description" content="A bilingual daily oracle blending zodiac signs, moon phase, weekday ruler, and personal daily guidance.">
  <link rel="canonical" href="https://alanwongsai.github.io/CosmicAlmanac/">
  <link rel="apple-touch-icon" href="cosmic-daily-icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Cosmic Almanac</title>
  <script>
    (function loadAnalytics() {
      try {
        if (localStorage.getItem('cosmic_analytics_opt_out') === '1') return;
      } catch (e) {}
      var script = document.createElement('script');
      script.defer = true;
      script.src = 'https://static.cloudflareinsights.com/beacon.min.js';
      script.setAttribute('data-cf-beacon', '{"token": "70ef6f3748dc4def9365bc384d702cc8"}');
      document.head.appendChild(script);
    })();
  </script>
  <link rel="stylesheet" href="app.css">
</head>
<body>

<div class="bg" aria-hidden="true">
  <div class="bg-depth"></div>
  <div class="bg-stars"></div>
</div>

<div class="top-controls" aria-label="App controls">
  <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle day/night mode">☀️</button>
  <button class="lang-btn" id="lang-btn" onclick="toggleLang()">中文</button>
</div>

<!-- ═══ ONBOARDING ═══ -->
<div id="onboarding" class="screen hidden">
  <div class="hero fu d0">
    <span class="app-icon">✦</span>
    <h1 class="app-title" id="ob-title"></h1>
    <p  class="app-sub"   id="ob-sub"></p>
  </div>
  <div class="glass ob-card fu d2">
    <h2 id="ob-h2"></h2>
    <p  id="ob-p"></p>
    <div class="field-lbl" id="ob-lbl"></div>
    <input type="date" id="bday-input" class="date-input"/>
    <button class="btn-reveal" id="ob-btn" onclick="startReading()"></button>
  </div>
</div>

<!-- ═══ READING ═══ -->
<div id="reading" class="screen hidden">
  <div class="r-header fu d0">
    <div class="r-date"  id="r-date"></div>
    <div class="r-title" id="r-title"></div>
    <div class="signs-row" id="r-signs"></div>
  </div>
  <div class="date-nav fu d1" aria-label="Reading date controls">
    <button class="nav-btn" id="date-prev" type="button" onclick="shiftSelectedDate(-1)"></button>
    <button class="nav-btn date-chip" id="date-today" type="button" onclick="jumpToToday()"></button>
    <button class="nav-btn" id="date-next" type="button" onclick="shiftSelectedDate(1)"></button>
  </div>
  <div class="glass almanac-summary interactive-card fu d1" id="almanac-summary" tabindex="0" role="button" data-detail="almanac"></div>
  <div class="cat-grid" id="cat-grid"></div>
  <div class="glass oracle-card interactive-card fu d5" id="oracle-card" tabindex="0" role="button" data-detail="oracle">
    <div class="oracle-lbl" id="oracle-lbl"></div>
    <div class="oracle-txt" id="oracle-txt"></div>
  </div>
  <div class="card sug-card interactive-card fu d6" id="suggestion-card" tabindex="0" role="button" data-detail="suggestion">
    <div class="sug-icon">🎯</div>
    <div>
      <div class="sug-lbl" id="sug-lbl"></div>
      <div class="sug-txt" id="sug-txt"></div>
    </div>
  </div>
  <div class="r-footer fu d7">
    <button class="btn-creator" id="btn-creator" type="button" data-detail="creator"></button>
    <button class="btn-reset" id="btn-reset" onclick="resetBday()"></button>
  </div>
</div>

<div class="confirm-modal" id="confirm-modal" aria-hidden="true">
  <div class="glass confirm-sheet" role="alertdialog" aria-modal="true" aria-describedby="confirm-msg">
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="confirm-btn" id="confirm-cancel" type="button" onclick="closeConfirm()"></button>
      <button class="confirm-btn danger" id="confirm-ok" type="button" onclick="confirmOk()"></button>
    </div>
  </div>
</div>

<div class="detail-modal" id="detail-modal" aria-hidden="true">
  <div class="glass detail-sheet" role="dialog" aria-modal="true" aria-labelledby="detail-title">
    <button class="detail-close" id="detail-close" type="button" onclick="closeDetail()">✕</button>
    <div class="detail-kicker" id="detail-kicker"></div>
    <div class="detail-title" id="detail-title"></div>
    <div class="detail-sub" id="detail-sub"></div>
    <div class="detail-facts" id="detail-facts"></div>
    <div class="detail-custom" id="detail-custom"></div>
    <div class="detail-copy" id="detail-copy"></div>
  </div>
</div>

<script src="content.en.js"></script>
<script src="content.zh.js"></script>
<script src="app.js"></script>
</body>
</html>
